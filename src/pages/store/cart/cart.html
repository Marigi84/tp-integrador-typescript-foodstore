<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Carrito</title>
</head>

<body>
    <header>
        <h1>Food Store</h1>

        <nav>
            <a href="/src/pages/store/home/home.html">Inicio</a>
            <a href="/src/pages/store/cart/cart.html">🛒 Carrito</a>
        </nav>

        <div class="user-info">
            <span id="user-name"></span>
            <button id="logout">Cerrar sesión</button>
        </div>
    </header>

    <main class="cart-page">
        <section class="cart-content">
            <h2>Mi carrito</h2>
            <section id="cart-container"></section>
        </section>

        <aside class="cart-summary">
            <h2>Resumen</h2>

            <p>Total: $<span id="cart-total">0</span></p>

            <button id="checkout-btn">Finalizar compra</button>
            <button id="clear-cart-btn">Vaciar carrito</button>
            <button id="continue-btn">Seguir comprando</button>
        </aside>
    </main>

    <script type="module" src="./cart.ts"></script>
</body>

</html>
